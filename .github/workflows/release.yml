name: release-please

on:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      core_released: ${{ steps.release.outputs['packages/core--release_created'] }}
      cli_released: ${{ steps.release.outputs['apps/cli--release_created'] }}
      create_fakeware_released: ${{ steps.release.outputs['apps/create-fakeware--release_created'] }}
      docs_released: ${{ steps.release.outputs['docs--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release PR branch
        id: pr
        if: ${{ steps.release.outputs.pr }}
        env:
          PR: ${{ steps.release.outputs.pr }}
        run: echo "branch=$(echo "$PR" | jq -r '.headBranchName')" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.pr }}
        with:
          ref: ${{ steps.pr.outputs.branch }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ steps.release.outputs.pr }}
      - name: Sync bun.lock with bumped versions
        if: ${{ steps.release.outputs.pr }}
        run: |
          rm -f bun.lock
          bun install
          if ! git diff --quiet bun.lock; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add bun.lock
            git commit -m "chore: sync bun.lock"
            git push origin "HEAD:${{ steps.pr.outputs.branch }}"
          fi

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.core_released == 'true' || needs.release-please.outputs.cli_released == 'true' || needs.release-please.outputs.create_fakeware_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile

      - run: bun run build

      - run: npm install -g npm@latest

      - name: Publish @fakeware/core
        if: ${{ needs.release-please.outputs.core_released == 'true' }}
        working-directory: packages/core
        run: |
          bun pm pack --destination .
          npm publish ./*.tgz --access public

      - name: Publish @fakeware/cli
        if: ${{ needs.release-please.outputs.cli_released == 'true' }}
        working-directory: apps/cli
        run: |
          bun pm pack --destination .
          npm publish ./*.tgz --access public

      - name: Publish create-fakeware
        if: ${{ needs.release-please.outputs.create_fakeware_released == 'true' }}
        working-directory: apps/create-fakeware
        run: |
          bun pm pack --destination .
          npm publish ./*.tgz --access public

  deploy-docs:
    needs: release-please
    if: ${{ needs.release-please.outputs.docs_released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-docs
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: docs
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer redeploy
        run: curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
