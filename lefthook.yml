pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    - name: typecheck
      glob: "*.{ts,tsx}"
      run: npx tsc --build --noEmit
      root: "."
    - name: lockfile-no-plugins
      glob: bun.lock
      run: |
        grep -q '"plugins/' bun.lock || exit 0
        hidden=""; trap '[ -n "$hidden" ] && mv "$hidden/plugins" plugins && rmdir "$hidden"' EXIT
        [ -d plugins ] && { hidden="$(mktemp -d)"; mv plugins "$hidden/plugins"; }
        bun install --lockfile-only >/dev/null 2>&1
      stage_fixed: true

post-commit:
  jobs:
    - name: lockfile-relink-plugins
      run: |
        ls plugins/*/package.json >/dev/null 2>&1 || exit 0
        bun install --lockfile-only >/dev/null 2>&1